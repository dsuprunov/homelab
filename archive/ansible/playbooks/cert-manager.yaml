---
- name: cert-manager | preflight
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - name: preflight | check kubectl
      ansible.builtin.command: kubectl version --client
      changed_when: false

    - name: preflight | check helm
      ansible.builtin.command: helm version
      changed_when: false

- name: cert-manager | install
  hosts: k8s_addon_cert_manager
  connection: local
  gather_facts: false
  roles:
    - k8s_addon_cert-manager
