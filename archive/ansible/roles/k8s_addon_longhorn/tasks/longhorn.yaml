---
- name: longhorn | install
  kubernetes.core.helm:
    release_name: longhorn
    chart_ref: longhorn
    chart_repo_url: "https://charts.longhorn.io"
    chart_version: "{{ longhorn_version }}"
    release_namespace: longhorn-system
    create_namespace: true
    release_values: "{{ lookup('ansible.builtin.file', role_path ~ '/files/values.yaml') | from_yaml }}"
    kubeconfig: "{{ kubeconfig }}"
    wait: true
    timeout: 15m
    state: present
  retries: 6
  delay: 30
  register: longhorn_deploy
  until: longhorn_deploy is succeeded

- name: longhorn | wait for pods
  ansible.builtin.command: >
    kubectl wait --for=condition=Ready pod --all
      -n longhorn-system
      --timeout=15m
  environment:
    KUBECONFIG: "{{ kubeconfig }}"
  retries: 3
  delay: 10
  register: longhorn_pods_ready
  until: longhorn_pods_ready.rc == 0
  changed_when: false

