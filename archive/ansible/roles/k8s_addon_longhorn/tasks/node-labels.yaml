---
- name: longhorn | configure storage node metadata
  kubernetes.core.k8s:
    kubeconfig: "{{ kubeconfig }}"
    state: patched
    api_version: v1
    kind: Node
    name: "{{ item }}"
    definition:
      metadata:
        labels:
          node.longhorn.io/create-default-disk: config
        annotations:
          node.longhorn.io/default-disks-config: "{{ [{'name': 'sdb', 'path': '/var/lib/longhorn', 'allowScheduling': true}] | to_json }}"
  loop: "{{ groups['k8s_node_longhorn'] }}"
