---
- name: cert-manager | install
  kubernetes.core.helm:
    release_name: cert-manager
    chart_ref: oci://quay.io/jetstack/charts/cert-manager
    chart_version: "{{ cert_manager_version }}"
    release_namespace: cert-manager
    create_namespace: true
    release_values: "{{ lookup('ansible.builtin.file', role_path ~ '/files/values.yaml') | from_yaml }}"
    kubeconfig: "{{ kubeconfig }}"
    wait: true
    timeout: 15m
    state: present
  retries: 6
  delay: 30
  register: cert_manager_deploy
  until: cert_manager_deploy is succeeded

- name: cert-manager | wait for pods
  ansible.builtin.command: >
    kubectl wait --for=condition=Ready pod --all
      -n cert-manager
      --timeout=15m
  environment:
    KUBECONFIG: "{{ kubeconfig }}"
  retries: 3
  delay: 10
  register: cert_manager_pods_ready
  until: cert_manager_pods_ready.rc == 0
  changed_when: false

- name: cert-manager | wait for clusterissuers CRD
  ansible.builtin.command: >
    kubectl wait --for=condition=Established --timeout=5s
      crd/clusterissuers.cert-manager.io
  environment:
    KUBECONFIG: "{{ kubeconfig }}"
  register: cert_manager_clusterissuers_crd_wait
  retries: 30
  delay: 5
  until: cert_manager_clusterissuers_crd_wait.rc == 0
  changed_when: false
