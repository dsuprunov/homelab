---
- name: metrics-server | install
  kubernetes.core.helm:
    release_name: metrics-server
    chart_ref: metrics-server
    chart_repo_url: "{{ metrics_server_chart_repo_url }}"
    chart_version: "{{ metrics_server_version }}"
    release_namespace: kube-system
    create_namespace: false
    kubeconfig: "{{ kubeconfig }}"
    wait: true
    timeout: 15m
    state: present
  retries: 6
  delay: 30
  register: metrics_server_deploy
  until: metrics_server_deploy is succeeded

- name: metrics-server | wait for deployment rollout
  ansible.builtin.command: >
    kubectl rollout status deployment/metrics-server
      -n kube-system
      --timeout=10m
  environment:
    KUBECONFIG: "{{ kubeconfig }}"
  retries: 3
  delay: 10
  register: metrics_server_rollout
  until: metrics_server_rollout.rc == 0
  changed_when: false
