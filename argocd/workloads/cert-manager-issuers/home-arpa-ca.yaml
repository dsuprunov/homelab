---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: home-arpa-root-ca
  namespace: cert-manager
spec:
  isCA: true
  commonName: home-arpa-root-ca
  secretName: home-arpa-root-ca
  duration: 87600h
  renewBefore: 720h
  privateKey:
    algorithm: ECDSA
    size: 256
  issuerRef:
    name: selfsigned
    kind: ClusterIssuer
    group: cert-manager.io

---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: home-arpa-ca
spec:
  ca:
    secretName: home-arpa-root-ca
