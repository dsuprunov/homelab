apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: monitoring-root-ca
  namespace: monitoring
spec:
  secretName: monitoring-root-ca-tls
  isCA: true
  commonName: monitoring-root-ca
  subject:
    organizations:
      - homelab
    organizationalUnits:
      - monitoring
  privateKey:
    algorithm: ECDSA
    size: 256
  duration: 87600h
  renewBefore: 720h
  issuerRef:
    name: selfsigned
    kind: ClusterIssuer
    group: cert-manager.io

---
apiVersion: cert-manager.io/v1
kind: Issuer
metadata:
  name: monitoring-ca
  namespace: monitoring
spec:
  ca:
    secretName: monitoring-root-ca-tls

