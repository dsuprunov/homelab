---
- name: k8s
  block:
    - name: k8s | install packages
      ansible.builtin.apt:
        update_cache: true
        name:
          - kubelet
          - kubeadm
          - kubectl
        state: present

    - name: k8s | hold packages
      ansible.builtin.dpkg_selections:
        name: "{{ item }}"
        selection: hold
      loop:
        - kubelet
        - kubeadm
        - kubectl

    - name: k8s | ensure manifests directory exists
      ansible.builtin.file:
        path: /etc/kubernetes/manifests
        state: directory
        owner: root
        group: root
        mode: "0755"

    - name: k8s | install kube-vip static pod manifest
      ansible.builtin.copy:
        src: kube-vip.yaml
        dest: /etc/kubernetes/manifests/kube-vip.yaml
        owner: root
        group: root
        mode: "0644"

    - name: k8s | enable kubelet
      ansible.builtin.systemd:
        name: kubelet
        enabled: true
