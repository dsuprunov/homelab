---
- name: kubelet-csr-approver | wait for apiserver
  ansible.builtin.command: kubectl --kubeconfig /etc/kubernetes/admin.conf get --raw=/readyz
  register: apiserver_readyz
  retries: 60
  delay: 2
  until: apiserver_readyz.rc == 0
  changed_when: false

- name: kubelet-csr-approver | ensure /etc/kubernetes/kubelet-csr-approver exists
  ansible.builtin.file:
    path: /etc/kubernetes/kubelet-csr-approver
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: kubelet-csr-approver | copy values.yaml
  ansible.builtin.copy:
    src: kubelet-csr-approver-values.yaml
    dest: /etc/kubernetes/kubelet-csr-approver/values.yaml
    owner: root
    group: root
    mode: "0644"
  register: kubelet_csr_values_file

- name: kubelet-csr-approver | check release exists
  ansible.builtin.command: helm status kubelet-csr-approver -n kube-system
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf
  register: kubelet_csr_status
  changed_when: false
  failed_when: false

- name: kubelet-csr-approver | helm repo add
  ansible.builtin.command: helm repo add kubelet-csr-approver https://postfinance.github.io/kubelet-csr-approver --force-update
  changed_when: false
  when: kubelet_csr_status.rc != 0 or kubelet_csr_values_file.changed

- name: kubelet-csr-approver | helm repo update
  ansible.builtin.command: helm repo update
  changed_when: false
  when: kubelet_csr_status.rc != 0 or kubelet_csr_values_file.changed

- name: kubelet-csr-approver | helm upgrade --install
  ansible.builtin.command: >
    helm upgrade --install kubelet-csr-approver kubelet-csr-approver/kubelet-csr-approver
      --version {{ kubelet_csr_approver_chart_version }}
      --namespace kube-system
      --create-namespace
      --reset-values
      -f /etc/kubernetes/kubelet-csr-approver/values.yaml
      --wait
      --timeout 5m
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf
  when: kubelet_csr_status.rc != 0 or kubelet_csr_values_file.changed