---
- name: cilium | wait for apiserver
  ansible.builtin.command: kubectl --kubeconfig /etc/kubernetes/admin.conf get --raw=/readyz
  register: apiserver_readyz
  retries: 60
  delay: 2
  until: apiserver_readyz.rc == 0
  changed_when: false

- name: cilium | check if already installed
  ansible.builtin.command: kubectl --kubeconfig /etc/kubernetes/admin.conf -n kube-system get ds cilium
  register: cilium_ds
  changed_when: false
  failed_when: false

#- name: cilium | already installed
#  ansible.builtin.debug:
#    msg: "Cilium already installed"
#  when: cilium_ds.rc == 0

- name: cilium | ensure /etc/kubernetes/cilium exists
  ansible.builtin.file:
    path: /etc/kubernetes/cilium
    state: directory
    owner: root
    group: root
    mode: "0755"
  when: cilium_ds.rc != 0

- name: cilium | copy values.yaml
  ansible.builtin.copy:
    src: cilium-values.yaml
    dest: /etc/kubernetes/cilium/values.yaml
    owner: root
    group: root
    mode: "0644"
  when: cilium_ds.rc != 0

- name: cilium | helm repo add
  ansible.builtin.command: helm repo add cilium https://helm.cilium.io/ --force-update
  register: cilium_repo_add
  changed_when: false
  when: cilium_ds.rc != 0

- name: cilium | helm repo update
  ansible.builtin.command: helm repo update
  register: cilium_repo_update
  changed_when: false
  when: cilium_ds.rc != 0

- name: cilium | helm upgrade --install
  ansible.builtin.command: >
    helm upgrade --install cilium cilium/cilium
      --version {{ cilium_version }}
      --namespace kube-system
      -f /etc/kubernetes/cilium/values.yaml
      --wait
      --timeout 10m
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf
  register: cilium_helm
  when: cilium_ds.rc != 0

