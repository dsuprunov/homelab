---
- name: kubelet-csr-approver | check Argo CD ownership
  ansible.builtin.command: >
    kubectl get application.argoproj.io kubelet-csr-approver
      -n argocd
      --ignore-not-found
      -o name
  environment:
    KUBECONFIG: "{{ kubeconfig }}"
  register: kubelet_csr_approver_argocd_application
  changed_when: false
  failed_when: false

- name: kubelet-csr-approver | report Argo CD ownership
  ansible.builtin.debug:
    msg: >-
      Skipping bootstrap because Argo CD Application
      argocd/kubelet-csr-approver owns kubelet-csr-approver.
  when: kubelet_csr_approver_argocd_application.stdout | trim | length > 0

- name: kubelet-csr-approver | bootstrap
  when: kubelet_csr_approver_argocd_application.stdout | trim | length == 0
  block:
    - name: kubelet-csr-approver | install
      kubernetes.core.helm:
        release_name: kubelet-csr-approver
        chart_ref: kubelet-csr-approver
        chart_repo_url: https://postfinance.github.io/kubelet-csr-approver
        chart_version: "{{ kubelet_csr_approver_version }}"
        release_namespace: kube-system
        create_namespace: false
        release_values: "{{ lookup('ansible.builtin.file', role_path ~ '/files/values.yaml') | from_yaml }}"
        kubeconfig: "{{ kubeconfig }}"
        wait: true
        timeout: 15m
        state: present
      retries: 6
      delay: 30
      register: kubelet_csr_approver_deploy
      until: kubelet_csr_approver_deploy is succeeded

    - name: kubelet-csr-approver | wait for deployment rollout
      ansible.builtin.command: >
        kubectl rollout status deployment/kubelet-csr-approver
          -n kube-system
          --timeout=10m
      environment:
        KUBECONFIG: "{{ kubeconfig }}"
      retries: 3
      delay: 10
      register: kubelet_csr_approver_rollout
      until: kubelet_csr_approver_rollout.rc == 0
      changed_when: false
