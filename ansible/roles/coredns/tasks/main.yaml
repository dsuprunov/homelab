---
- name: coredns
  block:
    - name: coredns | install packages
      ansible.builtin.apt:
        name:
          - curl
          - dnsutils
        state: present
        update_cache: true

    - name: coredns | download
      ansible.builtin.get_url:
        url: "https://github.com/coredns/coredns/releases/download/v{{ coredns_version }}/coredns_{{ coredns_version }}_linux_amd64.tgz"
        dest: "/tmp/coredns_{{ coredns_version }}_linux_amd64.tgz"
        checksum: "{{ coredns_checksum }}"
        mode: "0644"

    - name: coredns | install binary
      ansible.builtin.unarchive:
        src: "/tmp/coredns_{{ coredns_version }}_linux_amd64.tgz"
        dest: /usr/local/bin
        owner: root
        group: root
        mode: "0755"
        remote_src: true

    - name: coredns | ensure /etc/coredns exists
      ansible.builtin.file:
        path: /etc/coredns
        state: directory
        owner: root
        group: root
        mode: "0755"

    - name: coredns | ensure resolved config dir exists
      ansible.builtin.file:
        path: /etc/systemd/resolved.conf.d
        state: directory
        owner: root
        group: root
        mode: "0755"

    - name: coredns | disable systemd-resolved stub listener
      ansible.builtin.copy:
        src: disable-stub.conf
        dest: /etc/systemd/resolved.conf.d/disable-stub.conf
        owner: root
        group: root
        mode: "0644"
      register: coredns_resolved_stub_result

    - name: coredns | restart systemd-resolved
      ansible.builtin.systemd:
        name: systemd-resolved
        state: restarted
      when: coredns_resolved_stub_result.changed

    - name: coredns | install config files
      ansible.builtin.copy:
        src: "{{ item.src }}"
        dest: "{{ item.dest }}"
        owner: root
        group: root
        mode: "0644"
      loop:
        - src: Corefile
          dest: /etc/coredns/Corefile
        - src: home.arpa.zone
          dest: /etc/coredns/home.arpa.zone
        - src: 178.168.192.in-addr.arpa.zone
          dest: /etc/coredns/178.168.192.in-addr.arpa.zone
      loop_control:
        label: "{{ item.dest }}"
      register: coredns_config_files_result

    - name: coredns | install systemd unit
      ansible.builtin.copy:
        src: coredns.service
        dest: /etc/systemd/system/coredns.service
        owner: root
        group: root
        mode: "0644"
      register: coredns_unit_result

    - name: coredns | reload daemon
      ansible.builtin.systemd:
        daemon_reload: true
      when: coredns_unit_result.changed

    - name: coredns | enable and start service
      ansible.builtin.systemd:
        name: coredns
        enabled: true
        state: started

    - name: coredns | restart service
      ansible.builtin.systemd:
        name: coredns
        state: restarted
      when:
        - coredns_unit_result.changed or coredns_config_files_result.changed
