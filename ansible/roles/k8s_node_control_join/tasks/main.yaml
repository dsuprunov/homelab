---
- name: k8s
  block:
    - name: k8s | check if control-plane node already joined
      ansible.builtin.stat:
        path: /etc/kubernetes/admin.conf
      register: admin_conf

    - name: k8s | join control-plane node
      when: not admin_conf.stat.exists
      block:
        - name: k8s | get join command
          ansible.builtin.command: kubeadm token create --print-join-command
          environment:
            KUBECONFIG: /etc/kubernetes/admin.conf
          delegate_to: "{{ groups['k8s_cluster_init'] | first }}"
          run_once: true
          register: join_command
          changed_when: false

        - name: k8s | generate certificate key
          ansible.builtin.command: kubeadm certs certificate-key
          delegate_to: "{{ groups['k8s_cluster_init'] | first }}"
          run_once: true
          register: certificate_key_command
          changed_when: false
          no_log: true

        - name: k8s | set certificate key
          ansible.builtin.set_fact:
            kubeadm_certificate_key: "{{ certificate_key_command.stdout | trim }}"
          no_log: true

        - name: k8s | upload control-plane certs
          ansible.builtin.command: >
            kubeadm init phase upload-certs
              --upload-certs
              --certificate-key {{ kubeadm_certificate_key }}
          environment:
            KUBECONFIG: /etc/kubernetes/admin.conf
          delegate_to: "{{ groups['k8s_cluster_init'] | first }}"
          run_once: true
          no_log: true

        - name: k8s | join node as control-plane
          ansible.builtin.command: >
            {{ join_command.stdout }}
            --control-plane
            --certificate-key {{ kubeadm_certificate_key }}
            --apiserver-advertise-address {{ ansible_host }}
            --cri-socket unix:///run/containerd/containerd.sock
          no_log: true

        - name: k8s | ensure /etc/kubernetes/manifests exists
          ansible.builtin.file:
            path: /etc/kubernetes/manifests
            state: directory
            owner: root
            group: root
            mode: "0755"

        - name: k8s | install kube-vip static pod manifest
          ansible.builtin.copy:
            src: kube-vip-admin.yaml
            dest: /etc/kubernetes/manifests/kube-vip.yaml
            owner: root
            group: root
            mode: "0644"

        - name: k8s | wait for control-plane node ready
          ansible.builtin.command: >
            kubectl wait --for=condition=Ready node/{{ inventory_hostname }} --timeout=10m
          environment:
            KUBECONFIG: /etc/kubernetes/admin.conf
          delegate_to: "{{ groups['k8s_cluster_init'] | first }}"
          changed_when: false