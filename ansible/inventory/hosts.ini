[vms]
vm-k8s-control-01 ansible_host=10.10.0.121 ansible_user=ubuntu
; vm-k8s-control-02 ansible_host=10.10.0.122 ansible_user=ubuntu
; vm-k8s-control-03 ansible_host=10.10.0.123 ansible_user=ubuntu
vm-k8s-worker-01  ansible_host=10.10.0.151 ansible_user=ubuntu
vm-k8s-worker-02  ansible_host=10.10.0.152 ansible_user=ubuntu
vm-k8s-worker-03  ansible_host=10.10.0.153 ansible_user=ubuntu

[k8s_node_base]
vm-k8s-control-01
; vm-k8s-control-02
; vm-k8s-control-03
